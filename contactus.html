<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contact Africa Renal Research Network (ARRI) for sponsor, patient, or partnership enquiries.">
    <title>Contact Us | ARRI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body data-page="contactus">
    <div data-site-header></div>
    <main>
      <section class="section">
        <div class="container">
          <div class="page-copy page-copy--intro surface surface--strong center" data-reveal>
            <div class="page-header center">
              <h1 class="title-lg">Contact us</h1>
              <p>Use this page for sponsor introductions, patient registration questions, referral discussions, or general enquiries about Africa Renal Research Network.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container contact-grid">
          <form class="form-card surface surface--strong" data-static-form="contact-request" data-reveal>
            <div class="form-grid">
              <label class="field">
                <span>Name *</span>
                <input type="text" name="name" required>
              </label>
              <label class="field">
                <span>Phone Number</span>
                <input type="tel" name="phone_number">
              </label>
              <label class="field">
                <span>Email *</span>
                <input type="email" name="email" required>
              </label>
              <label class="field">
                <span>Company</span>
                <input type="text" name="company">
              </label>
              <label class="field">
                <span>Subject *</span>
                <input type="text" name="subject" required>
              </label>
              <label class="field field--full">
                <span>Question *</span>
                <textarea name="question" required></textarea>
              </label>
              <label class="field field--full">
                <span>Email To</span>
                <input type="email" name="email_to" value="info@arri.ke" readonly>
              </label>
            </div>
            <div class="form-submit-row">
              <button class="button" type="submit">Submit</button>
            </div>
          </form>

          <aside class="contact-card surface" data-reveal style="--delay: 120ms;">
            <ul class="contact-list">
              <li class="contact-links">
                <span class="feature-card__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M12 21s7-4.4 7-11a7 7 0 1 0-14 0c0 6.6 7 11 7 11Z"></path>
                    <circle cx="12" cy="10" r="2.5"></circle>
                  </svg>
                </span>
                <div class="contact-list__content">
                  <p>Suite 4.3, 4th Floor, Anderson Building, Nairobi Hospital, Nairobi, Kenya.</p>
                  <a href="tel:+254718930065">+254 718 930 065</a>
                  <a href="mailto:info@arri.ke">info@arri.ke</a>
                </div>
              </li>
            </ul>
          </aside>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="map-frame" data-reveal>
            <iframe src="https://maps.google.com/maps?q=Anderson%20Building%2C%20Nairobi%20Hospital.&amp;t=m&amp;z=12&amp;ie=UTF8&amp;iwloc=&amp;output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Anderson Building, Nairobi Hospital"></iframe>
          </div>
        </div>
      </section>
    </main>
    <div data-site-footer></div>
  </body>
</html>
